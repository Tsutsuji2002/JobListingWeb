name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  API_IMAGE_NAME: ghcr.io/${{ github.repository }}/joblistingweb-api
  CLIENT_IMAGE_NAME: ghcr.io/${{ github.repository }}/joblistingweb-client

jobs:
  # ============================================================
  # JOB 1: API Build & Test (.NET 8)
  # ============================================================
  api-build:
    name: API Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: JobListingWebAPI

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: ${{ secrets.DB_SA_PASSWORD }}
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P '${{ secrets.DB_SA_PASSWORD }}' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build API
        run: dotnet build --no-restore --configuration Release

      - name: Run EF Core migrations check
        run: |
          dotnet ef migrations list --no-build 2>/dev/null || echo "Migrations tool not available, skipping"

      - name: Run API Unit Tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        continue-on-error: true

  # ============================================================
  # JOB 2: Frontend Build (React)
  # ============================================================
  client-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: JobListingWebClient

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: JobListingWebClient/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint
        continue-on-error: true

      - name: Build React app
        env:
          REACT_APP_API_URL: ${{ vars.API_BASE_URL || 'https://api.example.com/api' }}
          REACT_APP_UI_URL: ${{ vars.UI_BASE_URL || 'https://app.example.com' }}
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: JobListingWebClient/build
          retention-days: 30

  # ============================================================
  # JOB 3: Docker Build & Push (on merge to main/develop)
  # ============================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [api-build, client-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build API Image ---
      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./JobListingWebAPI
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:latest
            ${{ env.API_IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_CONFIG=Release

      # --- Build Client Image ---
      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./JobListingWebClient
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE_NAME }}:latest
            ${{ env.CLIENT_IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_API_URL=${{ vars.API_BASE_URL || 'https://api.example.com/api' }}
            REACT_APP_UI_URL=${{ vars.UI_BASE_URL || 'https://app.example.com' }}

  # ============================================================
  # JOB 4: Deploy to Staging (develop branch)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to staging server (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --no-deps
            docker image prune -f

  # ============================================================
  # JOB 5: Deploy to Production (main branch)
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to production server (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps
            docker image prune -f
